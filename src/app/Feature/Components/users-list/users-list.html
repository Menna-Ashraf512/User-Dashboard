<div class="container mx-auto my-3">
  <div class="card">
    <p-table #dt2 [value]="customers" dataKey="id" [rows]="10" [rowsPerPageOptions]="[10, 25, 50]" [loading]="loading"
      [paginator]="true" [globalFilterFields]="['username', 'address.city', 'company.name', 'name']"
      [tableStyle]="{ 'min-width': '75rem' }">
      <ng-template #caption>
        <div class="flex">
          <p-iconfield iconPosition="left" class="ml-auto">
            <p-inputicon>
              <i class="pi pi-search"></i>
            </p-inputicon>
            <p-columnFilter type="text" field="name" placeholder="Type to search" ariaLabel="Filter Name"
              filterOn="input"></p-columnFilter>
          </p-iconfield>
        </div>
      </ng-template>
      <ng-template #header>
        <tr>
          <th style="width:22%">Name</th>
          <th style="width:22%">City</th>
          <th style="width:22%">Company Name</th>
        </tr>
      </ng-template>
      <ng-template #body let-customer>
        <tr>
          <td>
            {{ customer.name }}
          </td>
          <td>
            <span>{{ customer.address?.city }}</span>
          </td>
          <td>
            <span>{{ customer.company?.name }}</span>
          </td>
        </tr>
      </ng-template>
      <ng-template #emptymessage>
        <tr>
          <td colspan="3">
            <div class="flex items-center justify-center  py-4 w-full">

              @if (errorMessage) {
              <span class="text-red-500 font-medium">
                {{ errorMessage }}
              </span>
              } @else {
              <span class="text-gray-500">
                No customers found.
              </span>
              }

            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
